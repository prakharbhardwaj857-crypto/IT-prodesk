<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub User Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Dev Detective 🔍</h1>

  <div class="search">
    <input type="text" id="searchInput" placeholder="Enter GitHub username...">
    <button onclick="getUser()">Search</button>
  </div>

  <p id="loading"></p>
  <p id="error"></p>

  <div id="profile"></div>
  <div id="repos"></div>

  <script src="script.js"></script>
</body>
</html>
